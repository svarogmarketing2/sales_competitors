<style>

 #cbd5e1;border-radius:7px;text-align:center;font-weight:700;font-size:12px}.date-grid{display:grid;grid-template-columns:1fr;gap:5px}label{font-size:10.5px;color:#64748b;font-weight:700}input,select{border:1px solid #cbd5e1;border-radius:8px;padding:6px 8px;background:#fff;min-width:0}#reportDate{width:100%;font-weight:700;color:#111827}.filters{background:#fff;border:1px solid var(--line);border-radius:11px;padding:8px;margin-bottom:10px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;box-shadow:0 2px 8px rgba(15,23,42,.035)}.filters .label{font-size:11px;color:#64748b;font-weight:800;text-transform:uppercase;margin-right:2px}.mark-btn{background:#fff;color:#334155;border:1px solid #d6dee8;padding:6px 9px;font-weight:700}.mark-btn.active{background:#f4eee8;border-color:#d3a783;color:#743b16;box-shadow:0 2px 7px rgba(189,106,47,.09)}.swatch{display:inline-block;width:10px;height:10px;border-radius:50%;border:1px solid rgba(0,0,0,.22);margin-right:5px;vertical-align:-1px}.searchbox{margin-left:auto;min-width:230px;padding:7px 10px;border-radius:999px}.mark-section{border:1px solid var(--mark-border);border-radius:14px;background:#fff;margin-bottom:13px;overflow:hidden;box-shadow:0 4px 12px rgba(15,23,42,.045)}.mark-head{display:flex;align-items:center;gap:9px;background:linear-gradient(90deg,var(--mark-soft),#fff 72%);padding:8px 10px;border-bottom:1px solid #e5ebf2}.mark-strip{width:7px;align-self:stretch;border-radius:999px;background:var(--mark-color);border:1px solid rgba(0,0,0,.14)}.mark-title{font-size:16px;font-weight:800;color:#0f172a}.mark-badge{padding:3px 8px;border-radius:999px;background:rgba(255,255,255,.72);color:#344054;border:1px solid #d8dee8;font-weight:700}.mark-meta{font-size:11px;color:#64748b;font-weight:600}.zone-note{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}.zone-pill{font-size:10.5px;border:1px solid #d8dee8;border-radius:999px;padding:3px 7px;background:#fff;color:#475569;font-weight:800}.zone-rrc{border-left:4px solid #bd6a2f}.zone-opt{border-left:4px solid #2f7d4f}.zone-analysis{border-left:4px solid #64748b}.table-wrap{overflow:auto;padding:9px 10px 11px}table{width:100%;border-collapse:separate;border-spacing:0;min-width:1340px}th,td{border-bottom:1px solid #edf2f7;border-right:1px solid #edf2f7;padding:5px 6px;text-align:center;vertical-align:middle}th:last-child,td:last-child{border-right:0}thead th{background:#f4f6f8;color:#475569;font-size:11px;font-weight:800;position:sticky;top:0;z-index:1}.head-info{background:#eef2f7!important;color:#334155}.head-rrc{background:#f5ede5!important;color:#7a3f17!important}.head-opt{background:#eaf4ef!important;color:#1f6b43!important}.head-analysis{background:#eef0f3!important;color:#374151!important}
.rrc-cell a{display:inline-block;padding:3px 8px;border-radius:999px;background:#fff7ed;border:1px solid #e2b88e;color:#8a4b19;text-decoration:none;font-weight:800;box-shadow:inset 0 -1px 0 rgba(138,75,25,.12)}
.rrc-cell a::after{content:" ↗";font-size:10px;color:#9a6a3c;font-weight:700}
.rrc-cell a:hover{background:#fff1df;border-color:#cf9b68;color:#6e3710;text-decoration:underline}
tbody tr:nth-child(even){background:#fbfcfd}tbody tr:hover{background:#f7f3ef}.left{text-align:left}.diam{font-weight:800;background:#f8fafc;border:1px solid #e2e8f0;border-radius:999px;padding:2px 7px;display:inline-block}.code{font-weight:700;color:#334155}.price a,.price{font-weight:800;color:#111827;text-decoration:none;white-space:nowrap}.price a:hover{color:#9a4f1e;text-decoration:underline}.opt{color:#2f7d4f;font-weight:800;white-space:nowrap}.missing{color:#c2c9d3;font-weight:600}.analysis{font-size:11px;font-weight:800;white-space:nowrap}.pos{color:#b42318}.neg{color:#1f7a4d}.zero{color:#64748b}.comp-head{color:#fff!important}.comp-svarog{background:#bd6a2f!important}.comp-ptk{background:#4f79b8!important}.comp-kedr{background:#4c9a68!important}.comp-fox{background:#c8645d!important}.comp-oberon{background:#7d6bb1!important}.comp-mtl{background:#6b8f8a!important}.note{font-size:11px;color:#64748b;margin:8px 2px;text-align:right}@media(max-width:1050px){.toolbar{grid-template-columns:1fr}.discount-grid{grid-template-columns:repeat(2,minmax(112px,1fr))}.title{align-items:stretch;flex-direction:column}.actions{justify-content:flex-start}.searchbox{margin-left:0;min-width:100%;}}


/* === Soft B2B visual tuning: меньше яркости, больше читаемости === */
:root{--accent:#9a6a45;--green:#3f7356;--head:#3d4754;--line:#dfe5ec;--text:#2f3946;--muted:#6f7b8a;}
body{color:#2f3946;background:#f6f7f9;font-size:12px;}
h1{background:linear-gradient(90deg,#e8f7ee,#f5fbf7)!important;color:#1f3a2b!important;border-color:#b9dec7!important;border-left-color:#4f9a6b!important;font-weight:700!important;letter-spacing:.005em!important;box-shadow:0 2px 8px rgba(79,154,107,.08)!important;}
button{font-weight:650!important;box-shadow:none!important;}
.btn-excel{background:#4f7f60!important;color:#fff!important;}
.btn-refresh{background:#9a6a45!important;color:#fff!important;}
.panel,.filters,.mark-section{box-shadow:0 2px 8px rgba(15,23,42,.025)!important;border-color:#dfe5ec!important;}
.panel-title{color:#5d6876!important;font-weight:700!important;letter-spacing:.02em!important;}
.discount-item{background:linear-gradient(0deg,rgba(255,255,255,.94),rgba(255,255,255,.94)),var(--c)!important;border-left-width:3px!important;border-color:#dfe5ec!important;}
.discount-name{font-weight:650!important;color:#344054!important;}
.mark-head{background:linear-gradient(90deg,var(--mark-soft),#fff 82%)!important;}
.mark-title{font-weight:750!important;color:#243044!important;}
.mark-badge,.zone-pill{background:#fff!important;color:#526173!important;border-color:#d9e1ea!important;font-weight:700!important;}
.zone-note{gap:5px!important;}
.zone-rrc{border-left:3px solid #b98b62!important;}
.zone-opt{border-left:3px solid #6f9a7c!important;}
.zone-analysis{border-left:3px solid #8b95a1!important;}
thead th{background:#f7f8fa!important;color:#526173!important;font-weight:700!important;}
.head-info{background:#f1f4f7!important;color:#405064!important;}
.head-rrc{background:#f8f2ed!important;color:#755236!important;border-bottom:2px solid #d8b899!important;font-size:12px!important;}
.head-opt{background:#eef6f1!important;color:#3f7356!important;border-bottom:2px solid #b9d5c2!important;font-size:12px!important;}
.head-analysis{background:#f0f2f5!important;color:#4b5563!important;border-bottom:2px solid #c9d0d8!important;font-size:12px!important;}
.comp-head{color:#384252!important;font-weight:700!important;}
.comp-svarog{background:#ead8c7!important;}
.comp-ptk{background:#dbe5f2!important;}
.comp-kedr{background:#dcecdf!important;}
.comp-fox{background:#f0dedc!important;}
.comp-oberon{background:#e6e0f1!important;}.comp-mtl{background:#e1ecea!important;}
tbody tr:nth-child(even){background:#fcfdfe!important;}
tbody tr:hover{background:#f6f8fa!important;}
th,td{border-color:#edf1f5!important;padding:5px 6px!important;}
.price a,.price{font-weight:700!important;color:#1f2937!important;}
.opt{color:#3f7356!important;font-weight:700!important;}
.analysis{font-weight:700!important;}
.pos{color:#9b2f2a!important;}
.neg{color:#286848!important;}
.mark-strip{opacity:.72!important;}
.mark-btn{font-weight:650!important;background:#fff!important;color:#405064!important;}
.mark-btn.active{background:#f4f0ec!important;border-color:#cdb29b!important;color:#6e482d!important;box-shadow:none!important;}
.swatch{opacity:.75!important;}


/* === Разделение зон РРЦ / ОПТ / АНАЛИЗ РРЦ / АНАЛИЗ ОПТ === */
.section-start{border-left:3px solid #c8a98c!important;}
.subsection-start{border-left:3px solid #c5ccd5!important;}
.subhead-analysis{font-size:11.5px!important;text-transform:none!important;letter-spacing:.01em!important;}
.analysis-cell{background:#fbfcfd;}
.analysis-cell.opt-analysis-start{background:#f7f9fb;}
thead tr:first-child th.head-rrc, thead tr:first-child th.head-opt, thead tr:first-child th.head-analysis{box-shadow:inset 0 -2px 0 rgba(0,0,0,.045);}

.mark-title a{color:#1f5f3b;text-decoration:none;border-bottom:1px dashed rgba(31,95,59,.45);font-weight:800}
.mark-title a:hover{color:#2f7d4f;border-bottom-color:#2f7d4f}

.update-panel{margin-top:8px;background:#fff;border:1px solid #dfe5ec;border-radius:11px;padding:7px 9px;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:0 2px 8px rgba(15,23,42,.025)}
.update-status{display:flex;align-items:center;gap:8px;color:#526173;font-size:11.5px;font-weight:700}
.update-dot{width:10px;height:10px;border-radius:50%;background:#b8c0ca;display:inline-block}
.update-dot.loading{background:#c98a3c;animation:pulse 1s infinite}
.update-dot.success{background:#4f9a6b}
.update-dot.error{background:#b65b55}
.update-note{font-size:10.5px;color:#7b8794}
@keyframes pulse{0%{opacity:.45}50%{opacity:1}100%{opacity:.45}}

/* Точечная правка: блок скидок в одну компактную строку */
.discount-grid{display:flex!important;flex-wrap:nowrap!important;gap:5px!important;overflow-x:auto!important;padding-bottom:2px!important;align-items:center!important;}
.discount-item{flex:0 0 auto!important;min-width:112px!important;grid-template-columns:1fr 44px!important;padding:4px 5px!important;min-height:28px!important;}
.discount-item input{width:44px!important;height:22px!important;font-size:11.5px!important;padding:3px 4px!important;}
.discount-name{font-size:11.5px!important;}
@media(max-width:1050px){.discount-grid{display:flex!important;flex-wrap:nowrap!important;overflow-x:auto!important}.discount-item{min-width:112px!important}}

</style>
</head>

    const mUrl=markUrl(mark);
    const mTitle=mUrl?`<a href="${escAttr(mUrl)}">${esc(mark)}</a>`:esc(mark);
    html+=`<table><tr><td colspan="23" class="mark" style="background:${String(MARK_COLORS_RAW[mark].soft).replace('.12','.18')}">${mTitle} — ${items.length} поз.</td></tr>`;
    html+=`<tr><th colspan="2">Позиция</th><th colspan="6" class="rrc sep">РРЦ</th><th colspan="6" class="opt sep">ОПТ</th><th colspan="10" class="an sep">АНАЛИЗ</th></tr>`;
    html+=`<tr><th rowspan="2">Диаметр</th><th rowspan="2">Код СВАРОГ</th><th rowspan="2" class="svarog sep">СВАРОГ</th><th rowspan="2" class="ptk">ПТК</th><th rowspan="2" class="kedr">КЕДР</th><th rowspan="2" class="fox">FOXWELD</th><th rowspan="2" class="oberon">ОБЕРОН</th><th rowspan="2" class="mtl">MTL</th><th rowspan="2" class="svarog sep">СВАРОГ</th><th rowspan="2" class="ptk">ПТК</th><th rowspan="2" class="kedr">КЕДР</th><th rowspan="2" class="fox">FOXWELD</th><th rowspan="2" class="oberon">ОБЕРОН</th><th rowspan="2" class="mtl">MTL</th><th colspan="5" class="suban sep">Анализ РРЦ к СВАРОГ</th><th colspan="5" class="suban subsep">Анализ ОПТ к СВАРОГ</th></tr>`;
    html+=`<tr><th class="ptk sep">ПТК</th><th class="kedr">КЕДР</th><th class="fox">FOXWELD</th><th class="oberon">ОБЕРОН</th><th class="mtl">MTL</th><th class="ptk subsep">ПТК</th><th class="kedr">КЕДР</th><th class="fox">FOXWELD</th><th class="oberon">ОБЕРОН</th><th class="mtl">MTL</th></tr>`;
    items.forEach(x=>{
      const svR=x.svarog.rrc, svO=opt(svR,'СВАРОГ');
      html+=`<tr><td>${esc(String(x.diameter).replace('.',','))}</td><td>${esc(x.svarog.code)}</td><td class="sep">${fmtExcel(svR)}</td>`;
      OTHER_COMPETITORS.forEach(n=>html+=`<td>${fmtExcel((x.competitors[n]||{}).rrc)}</td>`);
      html+=`<td class="sep">${fmtExcel(svO)}</td>`;
      OTHER_COMPETITORS.forEach(n=>html+=`<td>${fmtExcel(opt((x.competitors[n]||{}).rrc,n))}</td>`);
      OTHER_COMPETITORS.forEach((n,i)=>{const comp=x.competitors[n]||{};const r=pctVal(svR,comp.rrc);html+=`<td class="${i===0?'sep ':''}${r>0?'pos':r<0?'neg':''}">${pctText(r)}</td>`;});
      OTHER_COMPETITORS.forEach((n,i)=>{const comp=x.competitors[n]||{};const o=pctVal(svO,opt(comp.rrc,n));html+=`<td class="${i===0?'subsep ':''}${o>0?'pos':o<0?'neg':''}">${pctText(o)}</td>`;});
      html+='</tr>';
    });
    html+='</table><br>';
  });
  html+=excelHistoryHtml();
  html+='</body></html>';
  const blob=new Blob([html],{type:'application/vnd.ms-excel;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='Отчет_ВЭ_РРЦ_ОПТ_Анализ_РРЦ_ОПТ_'+date+'.xls';
  a.click();
  URL.revokeObjectURL(a.href);
}
init();
restoreUpdateStatus();
scheduleNightUpdate();
setInterval(scheduleNightUpdate,60*60*1000);
</script>
</body></html>
